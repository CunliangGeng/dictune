name: Release TUI Executables

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            asset: dictune-linux-x64
          - target: bun-linux-arm64
            asset: dictune-linux-arm64
          - target: bun-darwin-x64
            asset: dictune-darwin-x64
          - target: bun-darwin-arm64
            asset: dictune-darwin-arm64
          - target: bun-windows-x64
            asset: dictune-windows-x64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install

      - name: Build executable
        working-directory: packages/tui
        run: bun run build.ts --target ${{ matrix.target }} --outfile dist/${{ matrix.asset }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: packages/tui/dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
